services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rxresume
      POSTGRES_USER: rxresume
      POSTGRES_PASSWORD: rxresume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rxresume -d rxresume"]
      interval: 2s
      timeout: 3s
      retries: 20

  chrome:
    image: ghcr.io/browserless/chromium:v2.18.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TIMEOUT: 30000
      CONCURRENT: 10
      TOKEN: chrome_token
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/json/version?token=chrome_token"]
      interval: 2s
      timeout: 3s
      retries: 20

  app:
    image: amruthpillai/reactive-resume@sha256:f8e8ec1321049ee2763453f3df4d414b012e5dcf92d3724ef86e9bbd8a55e708
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      chrome:
        condition: service_healthy
    environment:
      TZ: Etc/UTC
      APP_URL: http://localhost:3000
      PRINTER_ENDPOINT: ws://chrome:3000?token=chrome_token
      PRINTER_APP_URL: http://app:3000
      DATABASE_URL: postgresql://rxresume:rxresume@postgres:5432/rxresume
      AUTH_SECRET: this_is_a_local_ci_secret_32chars_ok
      STORAGE_TYPE: local
      DISABLE_SIGNUPS: "false"
      DISABLE_EMAIL_AUTH: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
