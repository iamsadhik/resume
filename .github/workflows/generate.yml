name: Generate Resume PDF

on:
  push:
    tags:
      - "*"

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images.tar
          key: docker-images-${{ runner.os }}-v1-f8e8ec1321049ee2763453f3df4d414b012e5dcf92d3724ef86e9bbd8a55e708

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-images.tar

      - name: Pull Docker images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          IMAGES="postgres:16-alpine ghcr.io/browserless/chromium:v2.18.0 amruthpillai/reactive-resume@sha256:f8e8ec1321049ee2763453f3df4d414b012e5dcf92d3724ef86e9bbd8a55e708"
          for image in $IMAGES; do
            docker pull "$image"
          done
          docker save $IMAGES -o /tmp/docker-images.tar

      - name: Start RxResume stack
        run: |
          docker compose -f docker-compose.ci.yml up -d --wait --wait-timeout 120 app

      - name: Generate PDF
        run: |
          chmod +x scripts/generate_pdf.py
          python3 scripts/generate_pdf.py resume.json output/resume.pdf

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp output/resume.pdf pages/resume.pdf
          echo "resume.arme.dev" > pages/CNAME
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          with open("resume.json", "r", encoding="utf-8") as handle:
              resume = json.load(handle)

          basics = resume.get("basics", {})
          name = basics.get("name", "Resume")
          headline = basics.get("headline", "")
          tag = os.environ.get("GITHUB_REF_NAME", "latest")
          updated = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          title = f"{name} — Resume" if name else "Resume"

          html = f"""<!doctype html>
          <html lang=\"en\">
            <head>
              <meta charset=\"utf-8\" />
              <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />
              <title>{title}</title>
              <style>
                :root {{
                  color-scheme: light;
                  --bg: #f6f2ec;
                  --card: #ffffff;
                  --ink: #1b1b1b;
                  --muted: #5a5a5a;
                  --accent: #9b4f2f;
                }}
                * {{ box-sizing: border-box; }}
                body {{
                  margin: 0;
                  font-family: "Source Serif 4", "Spectral", "Charter", serif;
                  background: var(--bg);
                  color: var(--ink);
                }}
                header {{
                  padding: 28px 20px 10px;
                }}
                .wrap {{
                  max-width: 960px;
                  margin: 0 auto;
                }}
                .title {{
                  font-size: 28px;
                  margin: 0 0 6px;
                }}
                .headline {{
                  margin: 0 0 10px;
                  color: var(--muted);
                  font-size: 16px;
                }}
                .meta {{
                  font-size: 12px;
                  color: var(--muted);
                }}
                .actions {{
                  display: flex;
                  gap: 12px;
                  flex-wrap: wrap;
                  margin: 16px 0 8px;
                }}
                .btn {{
                  display: inline-flex;
                  align-items: center;
                  gap: 8px;
                  padding: 10px 14px;
                  background: var(--accent);
                  color: #fff;
                  text-decoration: none;
                  border-radius: 999px;
                  font-size: 14px;
                }}
                .btn.secondary {{
                  background: transparent;
                  color: var(--accent);
                  border: 1px solid var(--accent);
                }}
                .frame-wrap {{
                  padding: 12px 20px 28px;
                }}
                .frame {{
                  width: 100%;
                  height: 80vh;
                  border: 0;
                  border-radius: 16px;
                  background: var(--card);
                  box-shadow: 0 20px 60px rgba(27, 27, 27, 0.12);
                }}
                @media (max-width: 720px) {{
                  .frame {{ height: 75vh; }}
                }}
              </style>
            </head>
            <body>
              <header>
                <div class=\"wrap\">
                  <h1 class=\"title\">{name}</h1>
                  <p class=\"headline\">{headline}</p>
                  <div class=\"meta\">Release: {tag} · Updated: {updated}</div>
                  <div class=\"actions\">
                    <a class=\"btn\" href=\"./resume.pdf\">Download PDF</a>
                    <a class=\"btn secondary\" href=\"./resume.pdf\" target=\"_blank\" rel=\"noopener\">Open in new tab</a>
                  </div>
                </div>
              </header>
              <div class=\"frame-wrap\">
                <div class=\"wrap\">
                  <iframe class=\"frame\" src=\"./resume.pdf\" title=\"Resume PDF\"></iframe>
                </div>
              </div>
            </body>
          </html>"""

          with open("pages/index.html", "w", encoding="utf-8") as handle:
              handle.write(html)
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down

      - name: Publish PDF to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/resume.pdf

  deploy-pages:
    needs: generate-pdf
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
