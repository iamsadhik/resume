name: Generate Resume PDF

on:
  push:
    tags:
      - "*"

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start RxResume stack
        run: |
          docker compose -f docker-compose.ci.yml up -d --wait --wait-timeout 120 app

      - name: Generate PDF
        run: |
          python3 -m pip install --quiet pypdf
          chmod +x scripts/generate_pdf.py
          python3 scripts/generate_pdf.py resume.json output/resume.pdf

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp output/resume.pdf pages/resume.pdf
          echo "resume.arme.dev" > pages/CNAME
          cat <<'EOF' > pages/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <meta http-equiv="refresh" content="0; url=./resume.pdf" />
              <title>Resume</title>
            </head>
            <body>
              <p>Redirecting to <a href="./resume.pdf">resume.pdf</a>...</p>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down

      - name: Publish PDF to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/resume.pdf

  deploy-pages:
    needs: generate-pdf
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
